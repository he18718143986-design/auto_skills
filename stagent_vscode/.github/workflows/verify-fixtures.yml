name: verify-fixtures

on:
  pull_request:
  push:
    branches:
      - main
      - master

jobs:
  rule20-and-fixtures:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - run: npm run compile
      - run: npm run verify:rule20
      - run: npm run verify:refactor
      - run: npm run verify:to-issues
      - run: npm run verify:debug
      - run: npm run verify:prototype
      - run: npm run verify:quality-scorer
