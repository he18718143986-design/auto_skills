name: verify-webview

on:
  pull_request:
    paths:
      - 'src/webview/templates/**'
      - 'src/webview/styles/**'
      - 'src/WebviewPanel.ts'
      - 'src/WebviewTemplateLoader.ts'
      - 'src/StagentAiControlsProvider.ts'
      - 'src/StagentTaskListProvider.ts'
      - 'scripts/build-webview.mjs'
      - 'src/test/webview*.test.ts'
      - 'src/test/fixtures/webview/**'
  push:
    branches:
      - main
      - master
    paths:
      - 'src/webview/templates/**'
      - 'src/webview/styles/**'
      - 'src/WebviewPanel.ts'
      - 'src/WebviewTemplateLoader.ts'
      - 'src/StagentAiControlsProvider.ts'
      - 'src/StagentTaskListProvider.ts'
      - 'scripts/build-webview.mjs'
      - 'src/test/webview*.test.ts'
      - 'src/test/fixtures/webview/**'

jobs:
  verify:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Compile and build webview
        run: npm run compile

      - name: Webview source-of-truth (bootstrap vs runtime)
        run: npm run verify:webview-source

      - name: Run webview tests
        run: node --test out/test/webview-template-snapshot.test.js out/test/webview-bundle.test.js out/test/webview-confirm-plan.test.js out/test/webview-bottom-dock-ui.test.js out/test/webview-input-hero-layout.test.js out/test/question-after-webview-html.test.js out/test/m8-webview-script-integration.test.js out/test/clarify-overlay-esc.test.js
