name: verify-engine

on:
  push:
    paths:
      - 'autoAI/**'
      - 'stagent_vscode/src/**'
      - 'stagent_docs/**'
  pull_request:
    paths:
      - 'autoAI/**'
      - 'stagent_vscode/src/**'
      - 'stagent_docs/**'
  workflow_dispatch:

jobs:
  parity-and-core:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: autoAI
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: autoAI/package-lock.json
      - name: Install root deps
        run: npm ci
      - name: Install @stagent/core deps
        run: npm ci
        working-directory: autoAI/packages/stagent-core
      - name: Weekly parity + core tests
        run: bash scripts/weekly-parity-check.sh
        env:
          ENGINE_GAP_MAX: '0'

  renderer-tests:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: autoAI
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: autoAI/package-lock.json
      - run: npm ci
      - name: Renderer vitest (full)
        run: npx vitest run src/renderer/src/__tests__
